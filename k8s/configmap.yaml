##############################################
# ConfigMap pour les variables d'env non-secrètes
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: tutut-config
  namespace: tutut
  labels:
    app: tutut
data:
  APP_NAME: "Tutut"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_TIMEZONE: "Europe/Paris"
  APP_LOCALE: "fr"
  APP_FALLBACK_LOCALE: "fr"
  APP_FAKER_LOCALE: "fr_FR"
  APP_URL: "https://tutut.stbo.fr"
  APP_NO_LOGIN: "false"
  USER_ID: "1"

  DB_CONNECTION: "mysql"
  DB_HOST: "tutut-db"
  DB_PORT: "3306"
  DB_DATABASE: "tutut"

  OAUTH_URL: "https://auth.assos.utc.fr"
  OAUTH_REDIRECT_URI: "https://tutut.stbo.fr/auth/callback"
  OAUTH_SCOPES: "users-infos"
  OAUTH_AUTHORIZATION_URL: "https://auth.assos.utc.fr/oauth/authorize"
  OAUTH_ACCESS_TOKEN_URL: "https://auth.assos.utc.fr/oauth/token"
  OAUTH_RESOURCE_OWNER_DETAILS_URL: "https://auth.assos.utc.fr/api/user"
  OAUTH_LOGOUT_URL: "https://auth.assos.utc.fr/logout"

  MAIL_MAILER: "log"
  MAIL_FROM_ADDRESS: "tutut@utc.fr"
  MAIL_FROM_NAME: "Tut'ut"

  APP_MAINTENANCE_DRIVER: "file"
  PHP_CLI_SERVER_WORKERS: "4"
  BCRYPT_ROUNDS: "12"

  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"

  FILAMENT_AUTH_GUARD: "web"

  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "tutut.stbo.fr"
  SESSION_SECURE_COOKIE: "true"

  BROADCAST_CONNECTION: "log"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "file"

  CACHE_STORE: "file"

  API_UTCRAWL: "https://utcrawl.assos.utc.fr/uvs"
