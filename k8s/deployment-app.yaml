apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutut-app
  namespace: tutut
  labels:
    app: tutut
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutut
      component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tutut
        component: app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z tutut-db 3306; do
                echo "Attente de MySQL...";
                sleep 3;
              done;
              echo "MySQL disponible."

      containers:
        - name: tutut
          image: docker.io/mathisdlmr/tutut:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: tutut-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: APP_KEY
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: MYSQL_PASSWORD
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: OAUTH_CLIENT_SECRET
            - name: API_UTCRAWL_KEY
              valueFrom:
                secretKeyRef:
                  name: tutut-secrets
                  key: API_UTCRAWL_KEY
          volumeMounts:
            - name: tutut-storage
              mountPath: /var/www/html/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: tutut-storage
          persistentVolumeClaim:
            claimName: tutut-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tutut-app
  namespace: tutut
  labels:
    app: tutut
    component: app
spec:
  selector:
    app: tutut
    component: app
  ports:
    - port: 80
      targetPort: 8080
      name: http
